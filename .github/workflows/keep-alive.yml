# Fallback keep-alive for the free Render web service.
# GitHub schedules can be delayed, so use a non-round minute every 5 minutes.
name: Keep Render Awake

on:
  schedule:
    - cron: '3-58/5 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Ping /health
        run: |
          curl --fail --silent --show-error \
            --retry 3 --retry-all-errors --retry-delay 5 \
            --header "Cache-Control: no-cache" \
            --header "User-Agent: MediOS-Keep-Alive/1.0" \
            "https://medios-backend.onrender.com/health?keepAlive=$(date +%s)"
