# Pings /health so the free Render web service does not sleep from inactivity.
# Schedule is approximate; GitHub may delay cron when the repo is quiet.
name: Keep Render Awake

on:
  schedule:
    # Every 10 minutes
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping /health
        run: |
          curl -fsS --retry 2 --retry-delay 5 \
            "https://medios-backend.onrender.com/health"
